services:
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ocr-models:/root/.paddlex
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  ingredient-parser:
    build:
      context: ./ingredient-parser
      dockerfile: Dockerfile
    # No host port mapping — accessible only from within the Docker network
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6g      # hard cap — container is OOM-killed if exceeded
        reservations:
          memory: 6g      # Docker will refuse to start this service if 6 GB RAM cannot be reserved
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s   # first-time model pull (~4 GB) can take a while

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - db-data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/data/recipeaid.db
      - OcrService__BaseUrl=http://ocr-service:8001
      - IngredientParser__BaseUrl=http://ingredient-parser:8002
      - Cors__AllowedOrigins__0=https://localhost:3443
    networks:
      - internal
    depends_on:
      ocr-service:
        condition: service_healthy
      ingredient-parser:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # No VITE_API_BASE_URL: nginx proxies /api/ → backend internally,
      # so the browser always talks to the same origin (port 3000).
      # This means any device on the local network can use https://<host-ip>:3000.
    ports:
      - "3000:80"    # HTTP → redirects to https://<host>:3443
      - "3443:443"   # HTTPS — accept the self-signed cert warning on first visit
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

  integration-tests:
    profiles:
      - integration
    build:
      context: ./integration
      dockerfile: Dockerfile
    environment:
      - FRONTEND_URL=http://frontend:80
      - BACKEND_URL=http://backend:8080
    networks:
      - internal
    depends_on:
      - frontend
      - backend
      - ocr-service
    restart: "no"

networks:
  internal:
    driver: bridge

volumes:
  db-data:
  ocr-models:     # PaddleX model files (~/.paddlex) — persists across image rebuilds
  ollama-models:  # Ollama model weights (~4 GB) — persists across ingredient-parser rebuilds
