services:
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ocr-models:/root/.paddlex
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - db-data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=/data/recipeaid.db
      - OcrService__BaseUrl=http://ocr-service:8001
      - Cors__AllowedOrigins__0=https://localhost
      - Cors__AllowedOrigins__1=https://172.205.220.46
      - INGREDIENT_PARSER_API_KEY=${INGREDIENT_PARSER_API_KEY}
    networks:
      - internal
    depends_on:
      ocr-service:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VM_HOST: "172.205.220.46"
      # No VITE_API_BASE_URL: nginx proxies /api/ → backend internally,
      # so the browser always talks to the same origin.
      # This means any device on the local network can use https://<host-ip>.
    ports:
      - "80:80"      # HTTP → redirects to HTTPS
      - "443:443"    # HTTPS — accept the self-signed cert warning on first visit
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

  integration-tests:
    profiles:
      - integration
    build:
      context: ./integration
      dockerfile: Dockerfile
    environment:
      - FRONTEND_URL=http://frontend:80
      - BACKEND_URL=http://backend:8080
    networks:
      - internal
    depends_on:
      - frontend
      - backend
      - ocr-service
    restart: "no"

networks:
  internal:
    driver: bridge

volumes:
  db-data:
  ocr-models:     # PaddleX model files (~/.paddlex) — persists across image rebuilds
