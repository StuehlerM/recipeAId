version: '3.8'

services:
  ingredient-parser:
    build:
      context: ./ingredient-parser
      dockerfile: Dockerfile
    ports:
      - "80:8002"
    environment:
      - OLLAMA_NUM_PARALLEL=1
      # Add debug logs so we can see EXACTLY where it hangs
      - OLLAMA_DEBUG=1
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 6g 
        limits:
          memory: 10g 
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 10s
      
      retries: 20
      start_period: 120s

volumes:
  ollama-models:
